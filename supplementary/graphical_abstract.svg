<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2A9D8F"/>
    </marker>
    <marker id="arrRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#C1432E"/>
    </marker>
    <marker id="arrInk" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1A1A2E"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1280" height="720" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="640" y="50" text-anchor="middle" font-size="31" font-weight="700" fill="#1A1A2E">Engineered Misunderstanding under Psychological Warfare</text>
  <text x="640" y="82" text-anchor="middle" font-size="18" fill="#6B7280">A Bayesian signaling game of felt-understanding collapse on social networks</text>
  <line x1="48" y1="104" x2="1232" y2="104" stroke="#E3E6EC" stroke-width="2"/>

  <!-- vertical divider -->
  <line x1="726" y1="140" x2="726" y2="664" stroke="#E3E6EC" stroke-width="2"/>

  <!-- ============ LEFT PANEL: MECHANISM ============ -->
  <text x="70" y="150" font-size="16" font-weight="700" fill="#6B7280" letter-spacing="1.5">THE MECHANISM</text>

  <!-- Group A cluster -->
  <g fill="#2A9D8F" stroke="#FFFFFF" stroke-width="2.5">
    <circle cx="150" cy="300" r="15"/><circle cx="110" cy="345" r="15"/><circle cx="190" cy="350" r="15"/>
    <circle cx="135" cy="395" r="15"/><circle cx="200" cy="285" r="15"/><circle cx="95" cy="290" r="15"/>
  </g>
  <g stroke="#2A9D8F" stroke-width="2" opacity="0.45">
    <line x1="150" y1="300" x2="110" y2="345"/><line x1="150" y1="300" x2="190" y2="350"/>
    <line x1="110" y1="345" x2="135" y2="395"/><line x1="200" y1="285" x2="150" y2="300"/><line x1="95" y1="290" x2="110" y2="345"/>
  </g>
  <text x="148" y="445" text-anchor="middle" font-size="20" font-weight="700" fill="#1A1A2E">Group A</text>
  <text x="148" y="467" text-anchor="middle" font-size="13.5" fill="#6B7280">anti-nuclear public</text>

  <!-- Group B cluster -->
  <g fill="#3F5BA8" stroke="#FFFFFF" stroke-width="2.5">
    <circle cx="560" cy="300" r="15"/><circle cx="600" cy="345" r="15"/><circle cx="520" cy="350" r="15"/>
    <circle cx="575" cy="395" r="15"/><circle cx="510" cy="285" r="15"/><circle cx="615" cy="290" r="15"/>
  </g>
  <g stroke="#3F5BA8" stroke-width="2" opacity="0.45">
    <line x1="560" y1="300" x2="600" y2="345"/><line x1="560" y1="300" x2="520" y2="350"/>
    <line x1="600" y1="345" x2="575" y2="395"/><line x1="510" y1="285" x2="560" y2="300"/><line x1="615" y1="290" x2="600" y2="345"/>
  </g>
  <text x="562" y="445" text-anchor="middle" font-size="20" font-weight="700" fill="#1A1A2E">Group B</text>
  <text x="562" y="467" text-anchor="middle" font-size="13.5" fill="#6B7280">pro-nuclear public</text>

  <!-- Channel: authentic signals -->
  <line x1="235" y1="318" x2="475" y2="318" stroke="#2A9D8F" stroke-width="3" marker-end="url(#arrGreen)"/>
  <line x1="475" y1="352" x2="235" y2="352" stroke="#2A9D8F" stroke-width="3" marker-end="url(#arrGreen)"/>
  <text x="355" y="307" text-anchor="middle" font-size="13.5" fill="#2A9D8F" font-weight="600">authentic recognition signals</text>

  <!-- Adversary -->
  <path d="M343,150 l34,30 l-34,30 l-34,-30 z" fill="#C1432E" stroke="#FFFFFF" stroke-width="2.5"/>
  <text x="343" y="187" text-anchor="middle" font-size="15" font-weight="700" fill="#FFFFFF">R</text>
  <text x="343" y="135" text-anchor="middle" font-size="15" font-weight="700" fill="#C1432E">Adversary</text>

  <!-- injected corrupted signals -->
  <line x1="343" y1="212" x2="343" y2="296" stroke="#C1432E" stroke-width="3" stroke-dasharray="7 5" marker-end="url(#arrRed)"/>
  <text x="368" y="247" font-size="11" fill="#C1432E" font-weight="600">injects fabricated</text>
  <text x="368" y="263" font-size="11" fill="#C1432E" font-weight="600">dismissive signals</text>
  <text x="368" y="279" font-size="11" fill="#C1432E" font-weight="600">at rate &#960;</text>

  <text x="370" y="520" text-anchor="middle" font-size="14.5" fill="#4B5563" font-style="italic">Perturbing the channel makes each group read the other</text>
  <text x="370" y="540" text-anchor="middle" font-size="14.5" fill="#4B5563" font-style="italic">as unwilling to understand, even when both are willing.</text>

  <!-- ============ RIGHT PANEL: TIPPING POINT ============ -->
  <text x="762" y="150" font-size="16" font-weight="700" fill="#6B7280" letter-spacing="1.5">THE TIPPING POINT</text>

  <!-- phase bar (vertical): top = high pi (collapse), bottom = low pi (cooperation) -->
  <rect x="775" y="178" width="58" height="148" fill="#C1432E" rx="4"/>
  <rect x="775" y="326" width="58" height="148" fill="#2A9D8F" rx="4"/>
  <line x1="769" y1="326" x2="839" y2="326" stroke="#1A1A2E" stroke-width="2.5" stroke-dasharray="6 4"/>

  <!-- axis ticks -->
  <text x="763" y="184" text-anchor="end" font-size="14" fill="#6B7280">&#960; = 1</text>
  <text x="763" y="331" text-anchor="end" font-size="15" fill="#1A1A2E" font-weight="700">&#960;*</text>
  <text x="763" y="474" text-anchor="end" font-size="14" fill="#6B7280">&#960; = 0</text>

  <!-- zone labels -->
  <text x="855" y="232" font-size="18" font-weight="700" fill="#C1432E">&#960; &gt; &#960;*:  Pooling equilibrium</text>
  <text x="855" y="256" font-size="15" fill="#4B5563">Mutual misrecognition is the unique outcome:</text>
  <text x="855" y="276" font-size="15" fill="#4B5563">felt-understanding collapse, mutual withdrawal.</text>

  <text x="855" y="392" font-size="18" font-weight="700" fill="#2A9D8F">&#960; &lt; &#960;*:  Separating equilibrium</text>
  <text x="855" y="416" font-size="15" fill="#4B5563">Recognition is sustained: each type signals</text>
  <text x="855" y="436" font-size="15" fill="#4B5563">authentically and is understood as it intends.</text>

  <!-- threshold formula -->
  <rect x="762" y="512" width="468" height="148" rx="10" fill="#F4F6F9" stroke="#D7DCE5" stroke-width="1.5"/>
  <text x="996" y="546" text-anchor="middle" font-size="16" fill="#6B7280">Analytical threshold</text>
  <!-- formula: pi* = 1 - (c_R) / (u_R . p) with explicitly positioned glyphs -->
  <text x="900" y="596" text-anchor="end" font-size="33" font-weight="700" fill="#1A1A2E">&#960;* = 1 &#8722;</text>
  <line x1="924" y1="587" x2="1052" y2="587" stroke="#1A1A2E" stroke-width="2.5"/>
  <text x="980" y="579" text-anchor="middle" font-size="27" font-weight="700" fill="#1A1A2E">c</text>
  <text x="997" y="585" text-anchor="middle" font-size="17" font-weight="700" fill="#1A1A2E">R</text>
  <text x="958" y="615" text-anchor="middle" font-size="27" font-weight="700" fill="#1A1A2E">u</text>
  <text x="975" y="621" text-anchor="middle" font-size="17" font-weight="700" fill="#1A1A2E">R</text>
  <text x="1020" y="615" text-anchor="middle" font-size="27" font-weight="700" fill="#1A1A2E">&#183; p</text>
  <text x="996" y="650" text-anchor="middle" font-size="14" fill="#4B5563">Above this rate, mutual misrecognition is the only equilibrium.</text>
</svg>
